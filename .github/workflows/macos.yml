name: macos
on:
  workflow_dispatch:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v2
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: build
        run: zig build
